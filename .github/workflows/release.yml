---
name: release

"on":
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[all]
      - run: python packaging/build.py --verify-install
      - uses: actions/upload-artifact@v4
        with:
          name: autoshelf-linux-bundle
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[all]
      - run: python -m compileall autoshelf
